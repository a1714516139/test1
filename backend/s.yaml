# Serverless Devs configuration for Alibaba Cloud Function Compute
# Install: npm install -g @serverless-devs/s
# Configure: s config add
# Deploy: s deploy

edition: 1.0.0
name: resume-analyzer
access: default

services:
  resume-analyzer:
    component: fc
    props:
      region: cn-hangzhou
      service:
        name: resume-analyzer-service
        description: AI Resume Analyzer backend service
      function:
        name: resume-analyzer-func
        description: FastAPI application for resume parsing and scoring
        runtime: python3.10
        codeUri: ./
        handler: app.fc_handler.handler
        memorySize: 512
        timeout: 120
        instanceConcurrency: 10
        environmentVariables:
          LLM_PROVIDER: ${env(LLM_PROVIDER, 'claude')}
          CLAUDE_API_KEY: ${env(CLAUDE_API_KEY)}
          CLAUDE_MODEL: ${env(CLAUDE_MODEL, 'claude-sonnet-4-20250514')}
          TONGYI_API_KEY: ${env(TONGYI_API_KEY)}
          TONGYI_MODEL: ${env(TONGYI_MODEL, 'qwen-plus')}
          REDIS_URL: ${env(REDIS_URL)}
          CORS_ORIGINS: ${env(CORS_ORIGINS, '*')}
          MAX_FILE_SIZE_MB: ${env(MAX_FILE_SIZE_MB, '10')}
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
